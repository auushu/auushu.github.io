<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书里桃源 · 雪宣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f0ebe3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: '华文楷体', 'KaiTi', '楷体', 'STKaiti', 'Times New Roman', serif;
            background-image: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M20 15 Q 30 10 40 15" stroke="%23d6c9bb" fill="none" stroke-width="0.3" opacity="0.2"/><circle cx="25" cy="35" r="2" fill="%23d6c9bb" opacity="0.1"/><circle cx="45" cy="45" r="3" fill="%23d6c9bb" opacity="0.1"/></svg>');
            background-repeat: repeat;
            background-size: 120px 120px;
        }
        
        /* 雪宣纸卡片 */
        .snow-paper {
            max-width: 760px;
            width: 100%;
            background: #fffcf7;
            border-radius: 0;
            padding: 4rem 3.5rem;
            box-shadow: 
                0 30px 50px -30px #847562,
                0 0 0 1px #ebe1d5,
                0 0 0 2px #fff9f0,
                0 0 30px rgba(255, 240, 220, 0.3);
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid #f0e3d6;
        }
        
        /* 手工毛边 */
        .snow-paper::before {
            content: "";
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px dashed #ddd0c2;
            pointer-events: none;
            opacity: 0.6;
        }
        
        /* 淡墨标题 */
        .title-light {
            font-size: 5rem;
            font-weight: 400;
            text-align: center;
            color: #3e3a35;
            letter-spacing: 0.8rem;
            margin-bottom: 0.5rem;
            font-family: '华文楷体', 'KaiTi', '楷体', serif;
            text-shadow: 2px 2px 3px rgba(170, 150, 130, 0.2);
            line-height: 1.2;
            position: relative;
            transform: scale(1.02);
            opacity: 0.95;
        }
        
        /* 淡淡的水痕 */
        .title-light::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbbaa8, #9b8b78, #cbbaa8, transparent);
        }
        
        .sub-light {
            text-align: center;
            font-size: 1.1rem;
            color: #b09f8e;
            letter-spacing: 0.8rem;
            margin: 0.5rem 0 2.5rem;
            font-style: italic;
        }
        
        /* 链接 - 淡墨点 */
        .link-light {
            text-align: center;
            margin: 2.5rem 0 3.5rem;
        }
        
        .brush-link-light {
            display: inline-block;
            font-size: 1.3rem;
            color: #6e6257;
            text-decoration: none;
            padding: 0.8rem 3rem;
            border: 1px solid #d4c5b6;
            background: rgba(255, 250, 240, 0.5);
            border-radius: 50px;
            font-family: '华文楷体', 'KaiTi', serif;
            letter-spacing: 6px;
            transition: all 0.4s;
            box-shadow: 0 5px 10px -5px #bba48e;
            backdrop-filter: blur(2px);
        }
        
        .brush-link-light:hover {
            background: #efe2d4;
            border-color: #ad947b;
            color: #3e332a;
            box-shadow: 0 12px 20px -10px #8e755c;
            transform: translateY(-3px);
        }
        
        /* 核心诗句 - 淡墨淋漓 */
        .poem-mist {
            margin: 3rem 0 4rem;
            padding: 2.5rem 1rem;
            background: linear-gradient(90deg, transparent, rgba(230, 215, 195, 0.15), transparent);
            border-top: 2px solid #e5d7c9;
            border-bottom: 2px solid #e5d7c9;
            position: relative;
        }
        
        .poem-mist p {
            font-size: 2.4rem;
            line-height: 3.5rem;
            text-align: center;
            font-family: '华文楷体', 'KaiTi', '楷体', serif;
            color: #3e3730;
            margin: 1.2rem 0;
            font-weight: 400;
            letter-spacing: 3px;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            transform: scaleY(1.02);
        }
        
        /* 水墨晕染效果 */
        .poem-mist::before {
            content: "⨯ ⨯ ⨯";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #dac2ae;
            font-size: 1rem;
            background: #fffcf7;
            padding: 0 20px;
            letter-spacing: 10px;
        }
        
        .poem-mist::after {
            content: "⨯ ⨯ ⨯";
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #dac2ae;
            font-size: 1rem;
            background: #fffcf7;
            padding: 0 20px;
            letter-spacing: 10px;
        }
        
        /* 解释列表 - 小楷 */
        .explain-light {
            list-style: none;
            margin: 3.5rem 0 2.5rem;
        }
        
        .explain-light li {
            display: flex;
            align-items: baseline;
            gap: 1.2rem;
            font-size: 1.3rem;
            color: #5a4f45;
            margin-bottom: 1.8rem;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px dotted #e2d5c8;
            font-family: '华文楷体', 'KaiTi', serif;
            line-height: 1.9rem;
            transition: all 0.3s;
        }
        
        .explain-light li:hover {
            background: rgba(240, 230, 215, 0.2);
            padding-left: 2rem;
        }
        
        .marker-light {
            font-size: 1.5rem;
            color: #bba28b;
            min-width: 2rem;
            text-align: center;
            opacity: 0.8;
        }
        
        /* 落款 - 极简 */
        .colophon-light {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3.5rem;
            padding-top: 1.8rem;
            border-top: 2px solid #ebdfd3;
            font-family: '华文楷体', 'KaiTi', serif;
            color: #948473;
        }
        
        .date-light {
            font-size: 1rem;
            letter-spacing: 3px;
        }
        
        .seal-light {
            font-size: 1.3rem;
            color: #9e6f53;
            border: 2px solid #d19b7a;
            padding: 0.2rem 1.5rem;
            border-radius: 40px 5px 40px 5px;
            background: #fff3e8;
            transform: rotate(-1deg);
            box-shadow: 0 3px 6px rgba(170, 100, 60, 0.2);
        }
        
        /* 飘落的淡墨点 */
        .ink-drop {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4c0af;
            border-radius: 50%;
            opacity: 0.2;
        }
        
        .drop1 { top: 10%; left: 5%; }
        .drop2 { bottom: 15%; right: 8%; width: 6px; height: 6px; }
        
        @media (max-width: 600px) {
            .snow-paper { padding: 2.5rem 1.5rem; }
            .title-light { font-size: 3.5rem; }
            .poem-mist p { font-size: 1.6rem; line-height: 2.5rem; }
            .explain-light li { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="snow-paper">
        <div class="ink-drop drop1"></div>
        <div class="ink-drop drop2"></div>
        
        <h1 class="title-light">书里桃源</h1>
        <div class="sub-light">—— 雪 宣 淡 墨 ——</div>
        
        <div class="link-light">
            <a href="http://ouok.cn" class="brush-link-light">ouok.cn</a>
        </div>
        
        <div class="poem-mist">
            <p>伴不在众，有心则甘。</p>
            <p>言不在多，相知则欢。</p>
            <p>纵是天寒，情暖人间！</p>
        </div>
        
        <ul class="explain-light">
            <li><span class="marker-light">·</span>朋友不用太多，彼此真诚走心，内心就（才）会甘甜。</li>
            <li><span class="marker-light">·</span>言语也不用太多，互相理解和懂得，才能真正让人开心。</li>
            <li><span class="marker-light">·</span>就算天气变得再冷，真挚的感情也能让人间变得温暖如春！</li>
        </ul>
        
        <div class="colophon-light">
            <span class="date-light">✻ 丙午 · 初雪 ✻</span>
            <span class="seal-light">桃源</span>
        </div>
    </div>
</body>
</html>
