<title>书里桃源</title>
  **书里桃源**
  http://ouok.cn

伴不在众，有心则甘。言不在多，相知则欢。纵是天寒，情暖人间！
=============

- 朋友不用太多，彼此真诚走心，内心就（才）会甘甜。

- 言语也不用太多，互相理解和懂得，才能真正让人开心。

- 就算天气变得再冷，真挚的感情也能让人间变得温暖如春！
